<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
         body {
      background: grey;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      color: white;
      font-family:custom;
    }
    body::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: url(blurred.png) no-repeat center center fixed;
  background-size: cover;
  filter: blur(8px);
  z-index: -1; 
}
        @font-face{
  font-family: custom;
  src:url(font1.ttf)
  }
    </style>
</head>
<body>

<div class="container my-5">
  <h2>Shopping Cart</h2>

  <table class="table table-bordered">
    <tr>
      <th>Product</th>
      <th>Price</th>
    </tr>
    <tr>
      <td>Big-Light</td>
      <td>$2,000,000</td>
    </tr>
  </table>

  <h4>Total: $2,000,000</h4>
  <button class="btn btn-success">Checkout</button>
</div>

</body>
</html>
