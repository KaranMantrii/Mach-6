<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
      background: grey;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      color: white;
      font-family:custom;
    }
    body::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: url(blurred.png) no-repeat center center fixed;
  background-size: cover;
  filter: blur(8px);
  z-index: -1; 
}
    .custom-card{
      background: rgba(255, 255, 255, 0.1); /* glassy overlay */
      backdrop-filter: blur(10px);
      border-radius: 15px;
      text-align: center;
      padding: 2rem;
    }
     @font-face{
  font-family: custom;
  src:url(font1.ttf)
  }
    </style>
</head>
<body>
<div class="custom-card h-100">
<div class="container my-5">
  <h2 class="text-center">Login</h2>

  <form>
    <input type="email" class="form-control mb-3" placeholder="Email">
    <input type="password" class="form-control mb-3" placeholder="Password">
    <a href="newindex.html" class="btn btn-danger w-100">Login</button></a>
    <p class="text-center mt-2">
      New user? <a href="newregister.html" class="text-danger">Register</a>
    </p>
  </form>
</div>
</div>
</body>
</html>
